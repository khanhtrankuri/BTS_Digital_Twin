BASE: base.yaml
CAMERA:
  USE_UNDISTORTED_DATA: true
SKY:
  ENABLED: true
  BACKGROUND_MODE: directional_sh
LOW_PARALLAX:
  ENABLED: true
DENSIFICATION:
  PERCENTILE: 0.97
  SKY_SCORE_MULTIPLIER: 0.02
  LOW_PARALLAX_SCORE_MULTIPLIER: 0.10
  MAX_NEW_GAUSSIANS_PER_STEP: 60000
EXPOSURE:
  TEST_MODE: pose_confidence_blend
  CONFIDENCE_TEMPERATURE: 0.05
  MAX_GAIN_DELTA_AT_TEST: 0.12

