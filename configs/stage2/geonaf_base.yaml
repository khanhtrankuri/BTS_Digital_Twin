# BTS GeoNAF-GS Phase-2 defaults. Stage 1 remains the unmodified AbsGS v11
# pipeline and does not read this file.
STAGE2:
  ENABLED: false

MODEL:
  NAME: geonaf
  IN_CHANNELS: 10
  OUT_CHANNELS: 4
  WIDTH: 32
  ENC_BLOCKS: [2, 2, 4, 8]
  MIDDLE_BLOCKS: 12
  DEC_BLOCKS: [2, 2, 2, 2]
  RESIDUAL_SCALE: 0.15
  UNCERTAINTY_GATING: false
  UNCERTAINTY_CHANNEL_INDEX: 8
  MIN_MASK: 0.05

DATA:
  INPUT_COMPONENTS:
    - gaussian_rgb
    - normalized_depth
    - normal
    - alpha
    - uncertainty
    - normalized_variance
  PATCH_SIZE: 256
  RANDOM_CROP: true
  HORIZONTAL_FLIP: true
  VERTICAL_FLIP: false
  ROTATE_90: false
  NUM_WORKERS: 4
  TRAIN_SPLIT: 0.9
  SEED: 42
  USE_SEGMENTATION: false
  SEGMENTATION_MASKS: []
  PAIR_DISTANCE_WEIGHT: 1.0
  PAIR_DIRECTION_WEIGHT: 1.0

NORMALIZATION:
  ALPHA_THRESHOLD: 0.01
  DEPTH_CLIP: 5.0
  VARIANCE_CLIP: 5.0
  EPS: 0.000001
  MIN_VALID_PIXELS: 1

LOSS:
  CHARBONNIER: 1.0
  CHARBONNIER_EPS: 0.001
  SSIM: 0.2
  EDGE: 0.1
  PERCEPTUAL: 0.0
  RESIDUAL: 0.01
  MASK: 0.005
  IDENTITY: 0.05
  IDENTITY_K: 10.0
  MULTIVIEW: 0.0
  MULTIVIEW_MIN_ALPHA: 0.01
  MULTIVIEW_MAX_UNCERTAINTY: 0.8
  MULTIVIEW_DEPTH_THRESHOLD: 0.05

TRAIN:
  OPTIMIZER: AdamW
  EPOCHS: 100
  BATCH_SIZE: 4
  LR: 0.0002
  WEIGHT_DECAY: 0.0001
  AMP: true
  GRAD_CLIP: 1.0
  EARLY_STOPPING: 15

INFERENCE:
  TILE_SIZE: 512
  TILE_OVERLAP: 64
  SAVE_RAW: true
  SAVE_MASK: false

JOINT:
  ENABLED: false
  STEPS: 1000
  GAUSSIAN_LR_SCALE: 0.01
  NAF_LR: 0.00002
  GS_L1: 0.8
  GS_MSE: 0.0
  GS_DSSIM: 0.2
  LAMBDA_FINAL: 1.0
  LAMBDA_MULTIVIEW: 0.0
