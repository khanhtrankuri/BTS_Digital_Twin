MODEL:
  NAME: GeometryGuidedNAFNet
  WIDTH: 64
  RGB_CHANNELS: 3
  GEOMETRY_CHANNELS: 5
  GEOMETRY_MODE: full
  ENCODER_BLOCKS: [2, 2, 4, 8]
  MIDDLE_BLOCKS: 8
  DECODER_BLOCKS: [2, 2, 2, 2]
  MAX_RESIDUAL: 0.15
  CONFIDENCE_GATE: false
DATA:
  MANIFEST: ""
  PATCH_SIZE: 256
  BATCH_SIZE: 8
  VAL_BATCH_SIZE: 1
  NUM_WORKERS: 4
  CACHE_MODE: none
  EDGE_PATCH_RATIO: 0.30
  HIGH_RESIDUAL_PATCH_RATIO: 0.20
  AUGMENT: true
  VERTICAL_FLIP: true
  ROTATE90: true
GEOMETRY:
  DEPTH_NORMALIZATION: robust_per_view
  ALPHA_THRESHOLD: 0.01
  MODULATION_SCALE: 0.1
LOSS:
  L1_WEIGHT: 0.20
  MSE_WEIGHT: 0.55
  DSSIM_WEIGHT: 0.20
  EDGE_WEIGHT: 0.05
  RESIDUAL_WEIGHT: 0.001
  LOW_FREQUENCY_WEIGHT: 0.02
  GATE_WEIGHT: 0.0001
  DEPTH_EDGE_LAMBDA: 0.25
  NORMAL_EDGE_LAMBDA: 0.10
LOSS_SCHEDULE:
  A: {L1_WEIGHT: 0.40, MSE_WEIGHT: 0.35, DSSIM_WEIGHT: 0.15, EDGE_WEIGHT: 0.03, RESIDUAL_WEIGHT: 0.005, LOW_FREQUENCY_WEIGHT: 0.02}
  B: {L1_WEIGHT: 0.20, MSE_WEIGHT: 0.55, DSSIM_WEIGHT: 0.20, EDGE_WEIGHT: 0.05, RESIDUAL_WEIGHT: 0.001, LOW_FREQUENCY_WEIGHT: 0.02}
  C: {L1_WEIGHT: 0.10, MSE_WEIGHT: 0.65, DSSIM_WEIGHT: 0.25, EDGE_WEIGHT: 0.01, RESIDUAL_WEIGHT: 0.001, LOW_FREQUENCY_WEIGHT: 0.02}
MULTIVIEW:
  ENABLED: false
  WEIGHT: 0.01
  DEPTH_CONSISTENCY_THRESHOLD: 0.02
OPTIMIZER:
  TYPE: AdamW
  LR: 0.0002
  WEIGHT_DECAY: 0.0001
  BETAS: [0.9, 0.99]
SCHEDULER:
  TYPE: cosine
  WARMUP_STEPS: 1000
  MIN_LR: 0.000001
TRAIN:
  EPOCHS: 100
  AMP: true
  EMA: true
  EMA_DECAY: 0.999
  GRAD_CLIP: 1.0
  GRAD_ACCUMULATION: 1
  SEED: 42
  DETERMINISTIC: true
  SAVE_EVERY: 5
  EARLY_STOPPING_PATIENCE: 20
EVALUATION:
  PSNR_MAX: 30.0
  LPIPS: true
INFERENCE:
  TILE_SIZE: 512
  TILE_OVERLAP: 32
