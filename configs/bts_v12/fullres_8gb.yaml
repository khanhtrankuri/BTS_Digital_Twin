BASE: fullres.yaml

# Fair A1 control for an 8 GB GPU: use the same topology budget and resolution
# transitions as quality_8gb.yaml, without its metric-aligned loss changes.
DENSIFICATION:
  MAX_GAUSSIANS: 450000
  MAX_NEW_GAUSSIANS_PER_STEP: 20000

RESOLUTION_SCHEDULE:
  STAGES:
    - {START_ITER: 0, SCALE: 0.50}
    - {START_ITER: 4000, SCALE: 0.75}
    - {START_ITER: 12000, SCALE: 1.00}
