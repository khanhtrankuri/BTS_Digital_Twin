OPTIMIZATION:
  iterations: 45000
  geometry_aware: true
  densification_residual_aware: true
  densification_edge_aware: true
  loss_schedule_enabled: true
  loss_stage_a_end: 12000
  loss_stage_b_end: 30000
  loss_stage_c_end: 45000
DENSIFICATION:
  METHOD: hybrid
  FROM_ITER: 500
  UNTIL_ITER: 15000
  INTERVAL: 100
  ORIGINAL_GRAD_WEIGHT: 0.20
  ABS_GRAD_WEIGHT: 0.55
  RESIDUAL_WEIGHT: 0.20
  EDGE_WEIGHT: 0.05
  ABS_GRAD_THRESHOLD: 0.0008
  RESIDUAL_TYPE: charbonnier
  SELECTION_MODE: percentile
  PERCENTILE: 0.95
  MIN_VISIBILITY_COUNT: 3
  MIN_GAUSSIAN_AGE: 200
  MAX_GAUSSIANS: 2500000
  MAX_NEW_GAUSSIANS_PER_STEP: 100000
EXPOSURE:
  ENABLED: true
  MODE: diagonal_gain_bias
  START_ITER: 500
  END_ITER: 30000
  FREEZE_ITER: 30000
  LR_INIT: 0.001
  LR_FINAL: 0.0001
  MIN_GAIN: 0.75
  MAX_GAIN: 1.25
  MAX_BIAS: 0.10
  GAIN_REG_WEIGHT: 0.001
  BIAS_REG_WEIGHT: 0.001
  ZERO_MEAN_REG_WEIGHT: 0.001
  TEST_MODE: identity
PIPELINE:
  antialiasing: true
