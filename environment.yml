name: BTS
channels:
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Tested on Windows with RTX 4060, NVIDIA driver CUDA 13.1, and PyTorch CUDA 12.8.
  # On Windows, install Visual Studio 2022 Build Tools with the C++ workload first.
  - python=3.12
  - pip
  - setuptools
  - wheel
  - tqdm
  - plyfile
  - cmake
  - ninja
  - pytest
  - cuda-nvcc=12.8
  - vs2022_win-64
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.7.1+cu128
      - torchvision==0.22.1+cu128
      - torchaudio==2.7.1+cu128
      - opencv-python
      - joblib
      - pyyaml

# After creating the env from this file, build the local CUDA extensions from
# the repository root:
#
#   conda env create -f environment.yml
#   conda activate BTS
#   python -m pip install --no-build-isolation submodules/diff-gaussian-rasterization submodules/simple-knn submodules/fused-ssim
#
# The --no-build-isolation flag is required because these setup.py files import
# torch while building. Conda's environment.yml pip section cannot pass that flag.
