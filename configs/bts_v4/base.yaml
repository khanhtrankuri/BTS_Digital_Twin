OPTIMIZATION:
  iterations: 45000
  geometry_aware: true
  densification_residual_aware: true
  densification_edge_aware: true
  loss_schedule_enabled: true
  loss_stage_a_end: 8000
  loss_stage_b_end: 18000
  loss_stage_c_end: 45000

DATA:
  RESOLUTION: 1

CAMERA:
  USE_UNDISTORTED_DATA: false
  STRICT_MODEL_VALIDATION: true
  WARN_IF_DISTORTION_DROPPED: true

SH_SCHEDULE:
  ENABLED: true
  MILESTONES:
    - [0, 0]
    - [3000, 1]
    - [8000, 2]
    - [18000, 3]

RESOLUTION_SCHEDULE:
  ENABLED: true
  CACHE_ON_CPU: true
  STAGES:
    - {START_ITER: 0, SCALE: 0.50}
    - {START_ITER: 5000, SCALE: 0.75}
    - {START_ITER: 15000, SCALE: 1.00}

DENSIFICATION:
  METHOD: persistent_multiview_hybrid
  FROM_ITER: 500
  UNTIL_ITER: 18000
  INTERVAL: 100
  WINDOW_SIZE: 100
  PERSISTENCE_DECAY: 0.80
  MIN_PERSISTENT_WINDOWS: 3
  PERSISTENT_THRESHOLD: 1.0
  RECENT_WINDOW_COUNT: 4
  MIN_RECENT_HITS: 3
  UNIQUE_VIEW_SUPPORT_ENABLED: true
  UNIQUE_VIEW_BINS: 12
  MIN_UNIQUE_VIEW_BINS: 2
  MIN_VISIBILITY_COUNT: 3
  MIN_GAUSSIAN_AGE: 200
  ORIGINAL_GRAD_WEIGHT: 0.05
  ABS_GRAD_WEIGHT: 0.40
  RESIDUAL_WEIGHT: 0.25
  EDGE_WEIGHT: 0.10
  MULTIVIEW_WEIGHT: 0.15
  DEPTH_SUPPORT_WEIGHT: 0.10
  BURST_SUPPRESSION_ENABLED: true
  BURST_PENALTY_WEIGHT: 0.15
  REQUIRE_DEPTH_CONSISTENCY: false
  MIN_DEPTH_SUPPORT: 0.50
  SKY_SCORE_MULTIPLIER: 0.05
  LOW_PARALLAX_SCORE_MULTIPLIER: 0.20
  RESIDUAL_TYPE: charbonnier
  SELECTION_MODE: percentile
  PERCENTILE: 0.95
  MAX_NEW_GAUSSIANS_PER_STEP: 100000
  MAX_GAUSSIANS: 2500000

PRUNING:
  IMPORTANCE_ENABLED: true
  START_ITER: 18000
  INTERVAL: 500
  MIN_OPACITY: 0.005
  MIN_VISIBILITY_COUNT: 3
  IMPORTANCE_THRESHOLD: 0.0001
  THIN_STRUCTURE_PROTECTION: true
  THIN_MIN_ANISOTROPY: 4.0
  THIN_MIN_EDGE_SUPPORT: 0.50
  THIN_MIN_VIEW_BINS: 2
  THIN_MAX_PROJECTED_AREA: 16.0
  THIN_PROTECTION_DECAY_AFTER_ITER: 35000

EXPOSURE:
  ENABLED: true
  MODE: diagonal_gain_bias
  START_ITER: 1000
  END_ITER: 30000
  FREEZE_ITER: 32000
  LR_INIT: 0.001
  LR_FINAL: 0.0001
  MIN_GAIN: 0.75
  MAX_GAIN: 1.25
  MAX_BIAS: 0.10
  GAIN_REG_WEIGHT: 0.001
  BIAS_REG_WEIGHT: 0.001
  ZERO_MEAN_REG_WEIGHT: 0.001
  TEST_MODE: pose_confidence_blend
  TEST_K: 4
  POSITION_WEIGHT: 1.0
  ANGLE_WEIGHT: 0.5
  TEMPORAL_WEIGHT: 0.5
  FOCAL_WEIGHT: 0.0
  DISTANCE_TEMPERATURE: 0.10
  CONFIDENCE_TEMPERATURE: 0.08
  MIN_CONFIDENCE: 0.0
  MAX_GAIN_DELTA_AT_TEST: 0.20
  MAX_BIAS_AT_TEST: 0.08

SKY:
  ENABLED: false
  MASK_DIR: masks/sky
  PHOTOMETRIC_WEIGHT: 0.50
  DEPTH_WEIGHT: 0.00
  NORMAL_WEIGHT: 0.00
  EDGE_WEIGHT: 0.05
  DENSIFICATION_WEIGHT: 0.05
  BACKGROUND_MODE: constant
  BACKGROUND_DEGREE: 2
  BACKGROUND_LR: 0.001

LOW_PARALLAX:
  ENABLED: false
  MASK_DIR: masks/low_parallax
  GEOMETRY_WEIGHT: 0.20
  DENSIFICATION_WEIGHT: 0.20

IMAGE_QUALITY:
  SHARPNESS_AWARE_SAMPLING: false
  MIN_SAMPLE_WEIGHT: 0.50
  MAX_SAMPLE_WEIGHT: 1.50
  BLUR_EDGE_WEIGHT_MIN: 0.20
  USE_CHARBONNIER: true
  CHARBONNIER_EPS: 0.001

MULTIVIEW_DEPTH:
  ENABLED: false
  WEIGHT: 0.01
  INTERVAL: 10
  SIGMA_Z: 0.02
  RELATIVE_THRESHOLD: 0.05

PIPELINE:
  antialiasing: true
