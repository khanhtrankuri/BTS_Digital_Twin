OPTIMIZATION:
  iterations: 45000
  geometry_aware: false
  densification_residual_aware: true
DENSIFICATION:
  METHOD: residual
  FROM_ITER: 500
  UNTIL_ITER: 15000
  INTERVAL: 100
  RESIDUAL_WEIGHT: 1.0
  RESIDUAL_TYPE: charbonnier
  SELECTION_MODE: percentile
  PERCENTILE: 0.95
  MIN_VISIBILITY_COUNT: 3
  MIN_GAUSSIAN_AGE: 200
  MAX_GAUSSIANS: 2500000
  MAX_NEW_GAUSSIANS_PER_STEP: 100000
EXPOSURE:
  ENABLED: true
  START_ITER: 500
  END_ITER: 30000
  FREEZE_ITER: 30000
  MIN_GAIN: 0.75
  MAX_GAIN: 1.25
  MAX_BIAS: 0.10
  TEST_MODE: identity
